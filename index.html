<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI K-Line Strategy Analyst (免編譯版)</title>
    <!-- 載入 Tailwind CSS 4 運行版本 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#09090b',
                        surface: '#18181b',
                        border: '#27272a',
                        accent: '#10b981',
                        'accent-blue': '#3b82f6',
                        'text-main': '#f4f4f5',
                        'text-dim': '#71717a',
                    }
                }
            }
        }
    </script>
    <!-- 載入核心框架與套件 (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .prose { color: #d1d5db; line-height: 1.6; }
        .prose h1, .prose h2, .prose h3 { color: #f4f4f5; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; }
        .prose strong { color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 從 CDN 取得 React Hooks 與元件
        const { useState, useEffect, useRef } = React;
        const { 
            BarChart3, Upload, History, Save, Trash2, Play, 
            AlertCircle, ChevronDown, Loader2, Maximize2, Settings 
        } = lucide;
        const { 
            Radar, RadarChart, PolarGrid, PolarAngleAxis, ResponsiveContainer 
        } = Recharts;

        // 從 ESM 載入 Google GenAI (純前端版)
        import { GoogleGenerativeAI } from 'https://esm.run/@google/genai';

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [strategy, setStrategy] = useState('');
            const [history, setHistory] = useState([]);
            const [selectedModel, setSelectedModel] = useState('gemini-1.5-flash');
            const [imagePreview, setImagePreview] = useState(null);
            const [base64Image, setBase64Image] = useState(null);
            const [analysis, setAnalysis] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const fileInputRef = useRef(null);
            const resultEndRef = useRef(null);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) setApiKey(savedKey);
                const savedHistory = localStorage.getItem('trading_strategy_history');
                if (savedHistory) setHistory(JSON.parse(savedHistory));
                const savedDraft = localStorage.getItem('trading_strategy_draft');
                if (savedDraft) setStrategy(savedDraft);
            }, []);

            useEffect(() => {
                localStorage.setItem('trading_strategy_draft', strategy);
            }, [strategy]);

            const saveApiKey = (key) => {
                setApiKey(key);
                localStorage.setItem('gemini_api_key', key);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const result = event.target.result;
                    setImagePreview(result);
                    setBase64Image(result.split(',')[1]);
                };
                reader.readAsDataURL(file);
            };

            const saveCurrentStrategy = () => {
                if (!strategy.trim()) return;
                const name = prompt('請輸入策略名稱:', `策略 ${new Date().toLocaleDateString()}`);
                if (!name) return;
                const newStrategy = {
                    id: Date.now().toString(),
                    name,
                    content: strategy,
                    date: new Date().toISOString()
                };
                const newHistory = [newStrategy, ...history];
                setHistory(newHistory);
                localStorage.setItem('trading_strategy_history', JSON.stringify(newHistory));
            };

            const runAnalysis = async () => {
                if (!apiKey) { setShowSettings(true); return; }
                if (!base64Image) { setError("請上傳 K 線圖表。"); return; }
                if (!strategy.trim()) { setError("請輸入交易策略。"); return; }

                setIsLoading(true); setError(null); setAnalysis(null);

                try {
                    const genAI = new GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: selectedModel });
                    
                    const result = await model.generateContent([
                        { text: `你是一位頂尖量化交易員。根據策略分析圖表：\n\n策略：\n${strategy}\n\n請用繁體中文提供結構化報告（建議動作、訊號解析、帶參數的執行計畫、風險提示）。\n最後必須包含此 JSON（不要用程式碼區塊）：\n[[SCORE_START]]\n{"trend": 0, "indicators": 0, "winrate": 0, "risk": 0, "strategy": 0}\n[[SCORE_END]]` },
                        { inlineData: { mimeType: "image/png", data: base64Image } }
                    ]);

                    const text = result.response.text();
                    const scoreMatch = text.match(/\[\[SCORE_START\]\]([\s\S]*)\[\[SCORE_END\]\]/);
                    let scores = { trend: 0, indicators: 0, winrate: 0, risk: 0, strategy: 0 };
                    let cleanMarkdown = text;

                    if (scoreMatch) {
                        try {
                            scores = JSON.parse(scoreMatch[1].trim());
                            cleanMarkdown = text.replace(/\[\[SCORE_START\]\]([\s\S]*)\[\[SCORE_END\]\]/, '').trim();
                        } catch (e) { console.error(e); }
                    }

                    setAnalysis({ markdown: marked.parse(cleanMarkdown), scores });
                    setTimeout(() => resultEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                } catch (err) {
                    setError(err.message || "連線失敗。");
                } finally { setIsLoading(false); }
            };

            const chartData = analysis ? [
                { subject: '趨勢強度', A: analysis.scores.trend, fullMark: 100 },
                { subject: '指標契合', A: analysis.scores.indicators, fullMark: 100 },
                { subject: '進場勝率', A: analysis.scores.winrate, fullMark: 100 },
                { subject: '風險評級', A: analysis.scores.risk, fullMark: 100 },
                { subject: '策略完成', A: analysis.scores.strategy, fullMark: 100 },
            ] : [];

            return (
                <div className="h-screen w-screen flex flex-col bg-bg text-text-main font-sans overflow-hidden">
                    <header className="h-[64px] border-b border-border flex items-center justify-between px-6 bg-surface/80 backdrop-blur-md z-50 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-6 h-6 bg-gradient-to-br from-accent-blue to-accent rounded shadow-[0_0_10px_rgba(59,130,246,0.2)]" />
                            <span className="font-bold text-lg tracking-tight uppercase">QUANTUM ANALYTICS</span>
                        </div>
                        <div className="flex items-center gap-6 text-[12px]">
                            <button onClick={() => setShowSettings(true)} className="flex items-center gap-2 hover:text-accent-blue transition-colors text-text-dim">
                                <Settings size={14} />
                                <span className="font-mono uppercase">API: {apiKey ? '••••' + apiKey.slice(-4) : '尚未設定'}</span>
                            </button>
                        </div>
                    </header>

                    {showSettings && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-bg/80 backdrop-blur-sm">
                            <div className="bg-surface border border-border p-6 rounded-xl shadow-2xl w-full max-w-md space-y-6">
                                <h3 className="text-sm font-bold uppercase tracking-widest flex items-center gap-2">系統設定</h3>
                                <input type="password" value={apiKey} onChange={(e) => saveApiKey(e.target.value)} placeholder="貼上您的 Gemini API 金鑰..." className="w-full bg-bg border border-border rounded-lg px-4 py-3 text-sm font-mono focus:border-accent-blue outline-none" />
                                <p className="text-[10px] text-text-dim">金鑰僅儲存於您的瀏覽器中。</p>
                                <button onClick={() => setShowSettings(false)} className="w-full bg-accent-blue text-white py-3 rounded-lg font-bold text-xs uppercase hover:brightness-110">儲存並關閉</button>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 grid grid-cols-[380px_1fr] bg-border overflow-hidden gap-[1px]">
                        <section className="bg-bg flex flex-col h-full overflow-hidden">
                            <div className="h-[52px] px-5 border-b border-border flex items-center justify-between">
                                <span className="text-[12px] font-bold text-text-dim uppercase tracking-widest">策略輸入</span>
                                <span className="text-[10px] text-accent-blue font-mono">免編譯版</span>
                            </div>
                            <div className="flex-1 p-5 gap-6 overflow-y-auto flex flex-col">
                                <textarea value={strategy} onChange={(e) => setStrategy(e.target.value)} placeholder="輸入交易策略..." className="w-full grow bg-surface border border-border rounded-lg p-3 text-[13px] font-mono outline-none focus:border-accent-blue resize-none" />
                                <div className="h-40 border-2 border-dashed border-border rounded-lg flex flex-col items-center justify-center bg-surface cursor-pointer relative" onClick={() => fileInputRef.current.click()}>
                                    <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />
                                    {imagePreview ? <img src={imagePreview} className="absolute inset-0 w-full h-full object-cover rounded-lg opacity-60" /> : <div className="text-center text-text-dim text-xs"><Upload size={20} className="mx-auto mb-2" />點擊上傳 K 線圖</div>}
                                </div>
                                <button onClick={runAnalysis} disabled={isLoading} className="bg-accent-blue py-4 rounded-lg font-bold hover:brightness-110 flex items-center justify-center gap-2">
                                    {isLoading ? <Loader2 className="animate-spin" size={18} /> : "執行分析"}
                                </button>
                                {error && <div className="p-3 bg-red-900/10 border border-red-800/20 text-red-200 text-[11px] rounded-lg">{error}</div>}
                            </div>
                        </section>

                        <section className="bg-[#111113] flex flex-col h-full overflow-hidden">
                            <div className="h-[52px] px-5 border-b border-border flex items-center shrink-0">
                                <span className="text-[12px] font-bold text-text-dim uppercase tracking-widest">智能分析報告</span>
                            </div>
                            <div className="flex-1 p-6 overflow-y-auto">
                                {!analysis && !isLoading ? (
                                    <div className="h-full flex flex-col items-center justify-center text-text-dim opacity-40">
                                        <BarChart3 size={80} strokeWidth={1} />
                                        <p className="mt-4 font-mono uppercase tracking-widest">等待資料輸入...</p>
                                    </div>
                                ) : analysis && (
                                    <div className="bg-surface border border-border rounded-xl p-8 shadow-2xl">
                                        <div ref={resultEndRef} />
                                        <div className="grid grid-cols-1 xl:grid-cols-[1fr_260px] gap-10">
                                            <div className="prose prose-invert max-w-none" dangerouslySetInnerHTML={{ __html: analysis.markdown }} />
                                            <div className="flex flex-col items-center">
                                                <span className="text-[10px] uppercase font-bold text-text-dim mb-4">分析分佈</span>
                                                <div className="h-56 w-56 bg-bg/30 rounded-full border border-border/50">
                                                    <ResponsiveContainer>
                                                        <RadarChart data={chartData}>
                                                            <PolarGrid stroke="#27272a" />
                                                            <PolarAngleAxis dataKey="subject" tick={{ fill: '#71717a', fontSize: 10 }} />
                                                            <Radar dataKey="A" stroke="#10b981" fill="#10b981" fillOpacity={0.4} />
                                                        </RadarChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>

                    <footer className="h-[32px] bg-surface border-t border-border flex items-center justify-between px-5 text-[10px] text-text-dim font-mono">
                        <div>SYSTEM STATUS: ONLINE</div>
                        <div>免編譯純靜態版</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
